<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>细胞进化竞技场</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="layout">
    <section class="panel">
      <h1>二维细胞进化 PVE + PVP</h1>
      <p>玩家1：WASD 移动，F 冲刺，G 普攻，R 进化</p>
      <p>玩家2：方向键移动，/ 冲刺，. 普攻，Shift 进化</p>
      <p>目标：采集资源并选择进化方向，最终进化成不同生物形态。</p>
      <div id="log" class="log"></div>
      <div class="evolution-board">
        <div id="p1Panel" class="evo-card"></div>
        <div id="p2Panel" class="evo-card"></div>
      </div>
    </section>
    <section class="game-wrap">
      <canvas id="game" width="1000" height="620"></canvas>
    </section>
  </main>

  <div id="choiceModal" class="modal hidden">
    <div class="modal-content">
      <h2 id="choiceTitle">选择进化</h2>
      <div id="choiceButtons" class="choice-buttons"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
